 CPT_DOM_ETT:0 "§H자치령§!은(는) 다음을 요구함: "Together for Victory" 및 "Death or Dishonor"이(가) 활성화 되었을 때 파시즘 정부가 아님.\n§H3000-4000§! £autonomy_texticon 사이"
 CPT_RKM_ETT:0 "§H국가판무관부§!은(는) 다음을 요구함: "Death or Dishonor". 그리고 "Waking the Tiger"이(가) 활성화 되었을 때 일본과 만주국이 종주국이 아님.\n§H0-1600§! £autonomy_texticon 사이"
 CPT_RPT_ETT:0 "§H국가보호령§!은(는) 다음을 요구함: "Death or Dishonor". 그리고 "Waking the Tiger"이(가) 활성화 되었을 때 일본과 만주국이 종주국이 아님.\n§H1600-3200§! £autonomy_texticon 사이"
 CPT_SAT_ETT:0 "§H위성국§!은(는) 다음을 요구함: "Death or Dishonor". 그리고 "Waking the Tiger"이(가) 활성화 되었을 때 일본과 만주국이 종주국이 아님.\n§H3200-4000§! £autonomy_texticon 사이"
 CPT_IPP_ETT:0 "§H제국 보호령§!은(는) 다음을 요구함: "Waking the Tiger". 그리고 괴뢰국은 파시즘 일본 또는 비동맹/파시즘 만주국이 지배국이어야 함. \n§H0-2400§! £autonomy_texticon 사이"
 CPT_IPA_ETT:0 "§H제국 제휴령§!은(는) 다음을 요구함: "Waking the Tiger". 그리고 괴뢰국은 파시즘 일본 또는 비동맹/파시즘 만주국이 지배국이어야 함. \n§H2400-4000§! £autonomy_texticon 사이 또는 만주국이 일본의 괴뢰국이고 "주장" 중점을 완료했을 때 §H2400-3000§! £autonomy_texticon 사이"
 CPT_IPS_ETT:0 "§H제국령§!은(는) 다음을 요구함: "Waking the Tiger". 그리고 만주국은 파시즘 일본이 지배국이어야 함 \n§H3000-4000§! £autonomy_texticon 사이"
