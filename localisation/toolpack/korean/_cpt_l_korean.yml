 CPT_INT_PUP_ETT:0 "§H통합 괴뢰국§!은(는) 다음을 요구함: "Together for Victory" 및 "Death or Dishonor"이(가) 활성화 되었을 때 파시즘 정부가 아님.\n§H0-1000§! £autonomy_texticon 사이§"
 CPT_PUP_ETT:0 "§H괴뢰국§!은(는) 아무것도 요구하지 않음. 만약 "Together for Victory" 및 "Death or Dishonor"이(가) 활성화 되었을 때:\n§H1000-2000§!£autonomy_texticon 사이"
